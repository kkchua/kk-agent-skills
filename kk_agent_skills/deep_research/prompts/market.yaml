name: market
description: "Market and competitive research. Covers landscape, players, trends, and strategic insights."

planner:
  num_searches: 6
  instruction: |
    You are a market research analyst. Given a market or industry topic, plan
    {num_searches} web searches to gather:
    - Key market players and their positioning
    - Market size, growth, and trends
    - Recent news, funding, and M&A activity
    - Customer pain points and demand drivers
    - Competitive differentiators and weaknesses
    - Emerging challengers and disruptors

search:
  context_size: low
  instruction: |
    You are a market research assistant. Given a search term, search the web and
    produce a concise market-focused summary. 2-3 paragraphs, under 300 words.
    Focus on: market data, company names, numbers/percentages, strategic moves,
    customer needs. No fluff. Numbers and facts preferred over opinions.

writer:
  min_words: 1000
  format: markdown
  output_type: report
  instruction: |
    You are a market research analyst writing a comprehensive market report. You will
    be provided with the original topic and research summaries.

    Structure your report with:
    1. Market overview and size
    2. Key players and competitive landscape
    3. Market trends and growth drivers
    4. Customer segments and pain points
    5. Strategic opportunities and threats
    6. Conclusion and key takeaways

    Use markdown with clear headings and bullet points. Include numbers and data where
    available. Aim for 1000+ words.

notification:
  enabled: true
  subject_template: "Market Research: {query}"
